# RenderCV workflow disabled.
#
# This site's CV is built from an Overleaf source by .github/workflows/sync-cv.yml
# (which writes assets/pdf/CV.pdf used by /cv/). The al-folio default RenderCV
# pipeline expects _data/cv.yml to follow RenderCV's schema (top-level `cv:` and
# `settings:` keys); ours follows al-folio's native CV-section schema, so the
# RenderCV step fails on every push to main with:
#   AttributeError: 'CommentedSeq' object has no attribute 'get'
#
# Disabled by restricting the trigger to manual `workflow_dispatch` only and
# removing all push triggers, so it no longer runs on commits to main.
name: Render a CV (disabled)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  noop:
    name: Disabled
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "RenderCV workflow is intentionally disabled."
          echo "CV PDF is produced from Overleaf by sync-cv.yml."
