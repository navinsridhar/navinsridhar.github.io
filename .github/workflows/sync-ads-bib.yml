name: Sync papers.bib from ADS library

# Discover newly-published papers from a public NASA ADS library and
# append them to _bibliography/papers.bib so the website stays in sync.
#
# What this does
# --------------
# * Pulls bibcodes from the ADS library given by ADS_LIBRARY_ID.
# * Diffs them against bibcodes already cited in papers.bib.
# * For any *new* bibcode, fetches the BibTeX from ADS and appends the
#   entry under a "Pending categorization" block at the bottom of
#   papers.bib with `category = {pending}` (which the publications page
#   does NOT render — so nothing shows up until the human moves it
#   into first/secondthird/nth/books/atel and adjusts metadata).
# * Commits the change directly to the default branch. Because the new
#   entries are sandboxed under `category = {pending}` and not rendered
#   by `/publications/`, this is safe — you'll see the addition in the
#   commit log and can move it into the right section at your leisure.
#
# Required configuration
# ----------------------
# * Secret  ADS_API_TOKEN  — generate at
#                            https://ui.adsabs.harvard.edu/user/settings/token
# * Variable ADS_LIBRARY_ID — defaults to the user's public library
#                            (override under Settings > Variables if it
#                            ever changes).

on:
  schedule:
    - cron: "0 9 * * 1" # 09:00 UTC every Monday
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-ads-bib.yml"
      - "scripts/sync_ads_library.py"

permissions:
  contents: write

concurrency:
  group: sync-ads-bib
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync ADS library into papers.bib
        id: sync
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
          ADS_LIBRARY_ID: ${{ vars.ADS_LIBRARY_ID || 'AspXr7NhTAaWjzQzWm-Kuw' }}
        run: |
          set -euo pipefail
          if [ -z "${ADS_API_TOKEN}" ]; then
            echo "::error::ADS_API_TOKEN secret is missing. Generate one at https://ui.adsabs.harvard.edu/user/settings/token and add it under Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi
          python scripts/sync_ads_library.py \
            --library-id "${ADS_LIBRARY_ID}" \
            --bib _bibliography/papers.bib

      - name: Commit & push if there are changes
        if: steps.sync.outputs.new_count != '' && steps.sync.outputs.new_count != '0'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _bibliography/papers.bib
          if git diff --cached --quiet -- _bibliography/papers.bib; then
            echo "No change in papers.bib — skipping commit."
            exit 0
          fi
          NEW_COUNT='${{ steps.sync.outputs.new_count }}'
          git commit -m "chore(bib): pull ${NEW_COUNT} new entr$( [ "${NEW_COUNT}" = "1" ] && echo y || echo ies ) from ADS library

          Auto-appended under the 'Pending categorization' block.
          Move into first/secondthird/nth/books/atel by hand and replace
          category={pending} when ready."
          # Pull-rebase first in case another workflow pushed something.
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push
