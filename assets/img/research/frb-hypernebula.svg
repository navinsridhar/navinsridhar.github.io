<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="FRB hypernebula placeholder">
  <defs>
    <radialGradient id="neb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#2d3436" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#74b9ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="360" fill="#0f0f1e"/>
  <!-- diffuse nebula -->
  <ellipse cx="300" cy="180" rx="220" ry="140" fill="url(#neb)"/>
  <ellipse cx="300" cy="180" rx="140" ry="90" fill="url(#neb)" opacity="0.6"/>
  <!-- compact source -->
  <circle cx="300" cy="180" r="28" fill="url(#core)"/>
  <circle cx="300" cy="180" r="6" fill="#fff"/>
  <!-- FRB pulses -->
  <circle cx="300" cy="180" r="60" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.7"/>
  <circle cx="300" cy="180" r="100" fill="none" stroke="#fdcb6e" stroke-width="1.5" opacity="0.45"/>
  <circle cx="300" cy="180" r="150" fill="none" stroke="#fdcb6e" stroke-width="1" opacity="0.25"/>
  <!-- background stars -->
  <circle cx="80" cy="60" r="1.5" fill="#fff"/>
  <circle cx="540" cy="90" r="1.5" fill="#fff"/>
  <circle cx="120" cy="300" r="1" fill="#fff"/>
  <circle cx="500" cy="280" r="1.2" fill="#fff"/>
  <text x="300" y="345" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#bbb">Persistent radio nebula around an FRB engine</text>
</svg>
