<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Merger precursor placeholder">
  <rect width="600" height="360" fill="#0f0f1e"/>
  <!-- inspiral spiral -->
  <g transform="translate(300 180)">
    <path d="M0 0 Q 30 -20 60 0 T 120 0 T 180 0" fill="none" stroke="#74b9ff" stroke-width="2" opacity="0.7"/>
    <path d="M0 0 Q -30 20 -60 0 T -120 0 T -180 0" fill="none" stroke="#74b9ff" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- two compact objects -->
  <circle cx="240" cy="180" r="14" fill="#fff"/>
  <circle cx="360" cy="180" r="14" fill="#fff"/>
  <circle cx="240" cy="180" r="22" fill="none" stroke="#fdcb6e" stroke-width="1" opacity="0.5"/>
  <circle cx="360" cy="180" r="22" fill="none" stroke="#fdcb6e" stroke-width="1" opacity="0.5"/>
  <!-- shock wave -->
  <ellipse cx="300" cy="180" rx="180" ry="120" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7" stroke-dasharray="6 4"/>
  <ellipse cx="300" cy="180" rx="240" ry="160" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 6"/>
  <!-- radio waves -->
  <path d="M 60 60 Q 90 80 120 60 T 180 60" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.7"/>
  <path d="M 420 60 Q 450 80 480 60 T 540 60" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.7"/>
  <text x="300" y="345" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#bbb">Shock-powered radio precursor of a NS–NS merger</text>
</svg>
